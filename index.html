function construirConcepto(num) {
  var tipo = document.getElementById('f-tipoServicio' + num).value;
  var paciente = (document.getElementById('f-paciente' + num).value || '').trim().toUpperCase();
  var procedimiento = (document.getElementById('f-procedimiento' + num).value || '').trim().toUpperCase();
  var campo = document.getElementById('f-concepto' + num);
  if (!tipo) { campo.value = ''; return; }
  var concepto = tipo;
  if (procedimiento) concepto += ' POR ' + procedimiento;
  if (paciente) concepto += ' PARA EL PACIENTE_' + paciente;
  campo.value = concepto;
}
