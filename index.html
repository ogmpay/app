function parsearFecha(str) {
  if (!str) return null;
  if (Object.prototype.toString.call(str)==='[object Date]' && !isNaN(str)) return new Date(str.getFullYear(),str.getMonth(),str.getDate());

  var d=new Date(str); return isNaN(d.getTime())?null:d;

  var d=new Date(str);return isNaN(d.getTime())?null:d;
}

function rfLeerArchivo(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
try {
      var data = new Uint8Array(e.target.result);
      var wb   = XLSX.read(data,{type:'array'});
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      var headerRow = -1;
      for (var i=0;i<rows.length;i++) {
        var joined = rows[i].join('|').toUpperCase();
        if (joined.includes('FECHA')&&joined.includes('ABONO')) { headerRow=i; break; }
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      var headerRow=-1;
      for(var i=0;i<rows.length;i++){
        var joined=rows[i].join('|').toUpperCase();
        if(joined.includes('FECHA')&&joined.includes('ABONO')){headerRow=i;break;}
}
      if (headerRow===-1) { toast('No se encontró encabezado FECHA/ABONO en el archivo','error'); return; }

      var headers = rows[headerRow].map(function(h){ return String(h).trim().toUpperCase(); });
      var iF = headers.findIndex(function(h){ return h.includes('FECHA'); });
      var iD = headers.findIndex(function(h){ return h.includes('DESCRI'); });
      var iA = headers.findIndex(function(h){ return h==='ABONO'; });

      var depositos = [];
      for (var j=headerRow+1;j<rows.length;j++) {
        var row   = rows[j];
        var abono = rfParseMonto(row[iA]);
        if (!abono||abono<=0) continue;
        var fechaRaw = row[iF];
        var fechaStr = '';
        if (typeof fechaRaw==='number') {
          var d = new Date(Math.round((fechaRaw-25569)*86400*1000));
          fechaStr = rfFormatFecha(d);
        } else { fechaStr = String(fechaRaw||'').trim(); }
        depositos.push({ fecha:fechaStr, descripcion:String(row[iD]||'').trim(), abono:abono });
      }

      rfState.movimientos = depositos;
      rfRenderMovimientosPreview(depositos);

      var zona = document.getElementById('rfDropZone');
      zona.classList.add('rf-upload-ok');
      zona.querySelector('p').innerHTML = '&#10003; <strong>'+escapeHtml(file.name)+'</strong> — '+depositos.length+' depósitos encontrados';
      document.getElementById('rfBtnPaso3').disabled = depositos.length===0;
      if (depositos.length===0) toast('No se encontraron abonos en el archivo','error');
    } catch(err) { toast('Error al leer archivo: '+err.message,'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function rfParseMonto(val) {
  if (val===null||val===undefined||val==='') return 0;
  if (typeof val==='number') return val>0?val:0;
  var n=Number(String(val).replace(/[\$,\s]/g,''));
  return isNaN(n)||n<=0?0:n;
}
function rfFormatFecha(d) {
  if (!d||isNaN(d)) return '';
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function rfRenderMovimientosPreview(depositos) {
  var tbody = document.getElementById('rfMovBody');
  tbody.innerHTML = depositos.slice(0,20).map(function(m){
    return '<tr><td style="font-size:12px;">'+escapeHtml(m.fecha)+'</td>'+
           '<td style="font-size:12px;">'+escapeHtml(m.descripcion.substring(0,80))+'</td>'+
           '<td><span class="monto">$'+Number(m.abono).toLocaleString('es-MX',{minimumFractionDigits:2})+'</span></td></tr>';
  }).join('');
  var total = depositos.reduce(function(s,m){ return s+m.abono; },0);
  document.getElementById('rfMovResumen').textContent =
    depositos.length+' depósitos'+(depositos.length>20?' (primeros 20 mostrados)':'')+
    ' · Total: $'+total.toLocaleString('es-MX',{minimumFractionDigits:2});
  document.getElementById('rfMovimientosPreview').classList.remove('hidden');
}
